name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devops-status-page

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure Yandex Cloud
        run: |
          echo '${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set cloud-id '${{ secrets.YC_CLOUD_ID }}'
          yc config set folder-id '${{ secrets.YC_FOLDER_ID }}'

      - name: Configure kubeconfig
        run: |
          yc managed-kubernetes cluster get-credentials '${{ secrets.YC_K8S_CLUSTER_ID }}' --external --force

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          sed "s|__APP_HOST__|${{ vars.APP_HOST }}|g" k8s/ingress.yaml | kubectl apply -f -

      - name: Update deployment image
        run: |
          kubectl set image deployment/devops-status-page \
            app=$IMAGE_NAME:$IMAGE_TAG \
            -n devops-status

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/devops-status-page -n devops-status
